<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LLM Chat Exporter</title>
  <style>
    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      color: #333;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
    }
    .status {
      font-size: 14px;
      margin-bottom: 16px;
      color: #666;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn:hover { background: #2563eb; }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }
    .btn-secondary:hover { background: #e5e7eb; }
    .footer {
      margin-top: 16px;
      font-size: 12px;
      text-align: center;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <h1>Universal LLM Exporter</h1>
  <div class="status" id="status-msg">Ready to export.</div>
  
  <button class="btn" id="export-btn">Export Current Chat</button>
  <button class="btn btn-secondary" id="options-btn">Settings</button>

  <div class="footer">
    v1.0.0
  </div>
  <script src="popup.js"></script>
</body>
</html>
